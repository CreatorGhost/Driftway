<!doctype html><html><head><meta charset="utf-8">
<style>
  body{margin:0;background:#0a0e16;font-family:system-ui,sans-serif;color:#e6ecf7;padding:28px}
  h1{font-weight:800;letter-spacing:-.5px;margin:0 0 4px}
  p{color:#9aa6bc;margin:0 0 24px}
  .grid{display:flex;gap:26px;flex-wrap:wrap}
  .item{text-align:center}
  .ic{width:160px;height:160px;border-radius:38px;position:relative;overflow:hidden;
      background:radial-gradient(120px 90px at 78% 18%, #3b82ff, #1565ff 55%, #0d44c9);
      box-shadow:0 10px 30px rgba(21,101,255,.35)}
  .ic::after{content:"";position:absolute;inset:0;
      background:repeating-linear-gradient(0deg,rgba(255,255,255,.10) 0 1px,transparent 1px 20px),
                 repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0 1px,transparent 1px 20px)}
  .ic svg{position:absolute;inset:0;width:100%;height:100%;z-index:2}
  .lbl{margin-top:12px;font-weight:700}
  .num{color:#4d9bff;font-weight:800}
</style></head><body>
  <h1>Drift<span style="color:#4d9bff">way</span> — icon options</h1>
  <p>White mark on the electric‑blue adaptive icon. Tell me a number (1–5).</p>
  <div class="grid">
    <div class="item">
      <div class="ic"><svg viewBox="0 0 108 108">
        <path fill="none" stroke="#fff" stroke-width="10.5" stroke-linecap="round" d="M36,64 C48,42 71,42 81,34"/>
        <path fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-opacity=".55" d="M33,75 C46,55 64,53 73,46"/>
        <path fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round" stroke-opacity=".30" d="M31,85 C42,70 55,68 61,64"/>
      </svg></div><div class="lbl"><span class="num">1.</span> Drift trail <small>(current)</small></div>
    </div>
    <div class="item">
      <div class="ic"><svg viewBox="0 0 108 108">
        <path fill="#fff" d="M37,28 h17 a26,26 0 0 1 0,52 h-17 z M50,40 v28 h4 a14,14 0 0 0 0,-28 z"/>
        <path fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-opacity=".5" d="M26,38 h8 M22,54 h10 M26,70 h8"/>
      </svg></div><div class="lbl"><span class="num">2.</span> Monogram “D” + speed</div>
    </div>
    <div class="item">
      <div class="ic"><svg viewBox="0 0 108 108">
        <circle cx="54" cy="40" r="4.5" fill="#fff"/>
        <path fill="#fff" d="M30,82 L50,44 h8 L78,82 h-12 L58,58 h-8 L42,82 z" opacity=".95"/>
        <path fill="none" stroke="#fff" stroke-width="3" stroke-opacity=".5" d="M22,82 h64"/>
      </svg></div><div class="lbl"><span class="num">3.</span> Road to horizon</div>
    </div>
    <div class="item">
      <div class="ic"><svg viewBox="0 0 108 108">
        <path fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-opacity=".45" d="M26,40 C40,30 64,30 78,40"/>
        <path fill="#fff" d="M44,40 L74,55 L44,70 z"/>
      </svg></div><div class="lbl"><span class="num">4.</span> Play + drift arc</div>
    </div>
    <div class="item">
      <div class="ic"><svg viewBox="0 0 108 108">
        <path fill="#fff" d="M54,26 a18,18 0 0 1 18,18 c0,14 -18,34 -18,34 c0,0 -18,-20 -18,-34 a18,18 0 0 1 18,-18 z"/>
        <circle cx="54" cy="44" r="7" fill="#1565ff"/>
        <path fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-opacity=".45" d="M30,86 C44,78 64,78 78,86"/>
      </svg></div><div class="lbl"><span class="num">5.</span> Waypoint pin</div>
    </div>
  </div>
</body></html>
